name: Check for llm_db updates

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-update:
    name: Check for new llm_db release
    runs-on: ubuntu-latest

    env:
      ELIXIR_VERSION: "1.18.2"
      OTP_VERSION: "27.2.1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Get locked llm_db version from mix.lock
        id: locked
        run: |
          locked=$(elixir -e '
          Application.ensure_all_started(:mix)
          lock = Mix.Dep.Lock.read()

          case lock[:llm_db] do
            {:hex, :llm_db, version, _checksum, _managers, _deps, _repo, _hash}
            when is_binary(version) ->
              IO.puts(version)

            {:git, _url, _ref, opts} ->
              tag = Keyword.get(opts, :tag)

              if is_binary(tag) do
                IO.puts(tag)
              else
                raise "Expected llm_db git tag in mix.lock, got #{inspect(opts)}"
              end

            other ->
              raise "Expected llm_db hex or git dependency in mix.lock, got: #{inspect(other)}"
          end
          ')

          echo "version=$locked" >> "$GITHUB_OUTPUT"
          echo "Locked llm_db version: $locked"

      - name: Get latest llm_db release version from Hex
        id: upstream
        run: |
          upstream=$(
            python3 - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen(
              "https://hex.pm/api/packages/llm_db"
          ) as response:
              package = json.load(response)

          version = package.get("latest_stable_version") or package.get("latest_version")

          if not version:
              raise SystemExit("No stable llm_db version found on Hex")

          print(version)
          PY
          )

          echo "version=$upstream" >> "$GITHUB_OUTPUT"
          echo "Latest llm_db version: $upstream"

      - name: Compare locked vs upstream versions
        id: compare
        env:
          LOCKED_VERSION: ${{ steps.locked.outputs.version }}
          UPSTREAM_VERSION: ${{ steps.upstream.outputs.version }}
        run: |
          comparison=$(elixir -e '
          locked = System.fetch_env!("LOCKED_VERSION")
          upstream = System.fetch_env!("UPSTREAM_VERSION")

          case Version.compare(locked, upstream) do
            :lt -> IO.puts("lt")
            :eq -> IO.puts("eq")
            :gt -> IO.puts("gt")
          end
          ')

          if [ "$comparison" = "eq" ] || [ "$comparison" = "gt" ]; then
            echo "already_latest=true" >> "$GITHUB_OUTPUT"
            echo "Already on latest version, nothing to do."
          else
            echo "already_latest=false" >> "$GITHUB_OUTPUT"
            echo "New release available: ${{ steps.upstream.outputs.version }} (current: ${{ steps.locked.outputs.version }})"
          fi

      - name: Update llm_db dependency
        id: update
        if: steps.compare.outputs.already_latest == 'false'
        env:
          UPSTREAM_VERSION: ${{ steps.upstream.outputs.version }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          upstream_version = os.environ["UPSTREAM_VERSION"]
          version_parts = upstream_version.split(".")

          if len(version_parts) < 2:
              raise SystemExit(f"Unsupported llm_db version: {upstream_version}")

          requirement = f'~> {version_parts[0]}.{version_parts[1]}'
          path = Path("mix.exs")
          source = path.read_text()

          updated = source
          total_matches = 0

          updated, count = re.subn(
              r'\{:llm_db,\s*"~>\s*\d+\.\d+"\}',
              f'{{:llm_db, "{requirement}"}}',
              updated,
          )
          total_matches += count

          updated, count = re.subn(
              r'\{:llm_db,\s*git:\s*"https://github\.com/agentjido/llm_db\.git",\s*tag:\s*"[^"]+"\}',
              f'{{:llm_db, "{requirement}"}}',
              updated,
          )
          total_matches += count

          if total_matches != 1:
              raise SystemExit("Expected exactly one llm_db dependency entry in mix.exs")

          path.write_text(updated)
          PY

          mix local.hex --force
          mix local.rebar --force
          mix deps.update llm_db

          if git diff --quiet -- mix.exs mix.lock; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "llm_db dependency already up to date."
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "mix.exs and mix.lock updated."
          fi

      - name: Run tests
        if: steps.update.outputs.updated == 'true'
        run: mix test

      - name: Commit and push update
        if: steps.update.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mix.exs mix.lock
          git commit -m "chore(deps): update llm_db to ${{ steps.upstream.outputs.version }}"
          git push
