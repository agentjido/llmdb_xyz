name: Check for llm_db updates

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-update:
    name: Check for new llm_db release
    runs-on: ubuntu-latest

    env:
      MIX_ENV: dev
      ELIXIR_VERSION: "1.18.2"
      OTP_VERSION: "27.2.1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Get locked llm_db release tag from mix.lock
        id: locked
        run: |
          locked=$(elixir -e '
          {lock, _binding} = Code.eval_file("mix.lock")

          case lock[:llm_db] do
            {:git, _url, _ref, opts} ->
              tag = Keyword.get(opts, :tag)

              if is_binary(tag) do
                IO.puts(tag)
              else
                raise "Expected llm_db git tag in mix.lock, got #{inspect(opts)}"
              end

            other ->
              raise "Expected llm_db git dependency in mix.lock, got: #{inspect(other)}"
          end
          ')

          echo "tag=$locked" >> "$GITHUB_OUTPUT"
          echo "Locked llm_db tag: $locked"

      - name: Get latest stable llm_db release tag from GitHub
        id: upstream
        run: |
          upstream=$(curl -fsSL https://api.github.com/repos/agentjido/llm_db/releases/latest | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"])')
          echo "tag=$upstream" >> "$GITHUB_OUTPUT"
          echo "Latest stable llm_db tag: $upstream"

      - name: Compare locked vs upstream tags
        id: compare
        env:
          LOCKED_TAG: ${{ steps.locked.outputs.tag }}
          UPSTREAM_TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          comparison=$(elixir -e '
          locked = System.fetch_env!("LOCKED_TAG")
          upstream = System.fetch_env!("UPSTREAM_TAG")

          case Version.compare(locked, upstream) do
            :lt -> IO.puts("lt")
            :eq -> IO.puts("eq")
            :gt -> IO.puts("gt")
          end
          ')

          if [ "$comparison" = "eq" ] || [ "$comparison" = "gt" ]; then
            echo "already_latest=true" >> "$GITHUB_OUTPUT"
            echo "Already on latest version, nothing to do."
          else
            echo "already_latest=false" >> "$GITHUB_OUTPUT"
            echo "New release available: ${{ steps.upstream.outputs.tag }} (current: ${{ steps.locked.outputs.tag }})"
          fi

      - name: Update llm_db dependency
        id: update
        if: steps.compare.outputs.already_latest == 'false'
        env:
          UPSTREAM_TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("mix.exs")
          source = path.read_text()
          updated, count = re.subn(
              r'(\{:llm_db,\s*git:\s*"https://github\.com/agentjido/llm_db\.git",\s*tag:\s*")[^"]+(")',
              rf'\g<1>{os.environ["UPSTREAM_TAG"]}\2',
              source,
          )

          if count != 1:
              raise SystemExit("Expected exactly one llm_db dependency entry in mix.exs")

          path.write_text(updated)
          PY

          mix local.hex --force
          mix local.rebar --force
          mix deps.get

          if git diff --quiet -- mix.exs mix.lock; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "llm_db dependency already up to date."
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "mix.exs and mix.lock updated."
          fi

      - name: Run tests
        if: steps.update.outputs.updated == 'true'
        run: mix test

      - name: Commit and push update
        if: steps.update.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mix.exs mix.lock
          git commit -m "mix: update llm_db to ${{ steps.upstream.outputs.tag }}"
          git push
