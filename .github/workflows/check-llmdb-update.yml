name: Check for llm_db updates

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-update:
    name: Check for new llm_db commit
    runs-on: ubuntu-latest

    env:
      MIX_ENV: dev
      ELIXIR_VERSION: "1.18.2"
      OTP_VERSION: "27.2.1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Get locked llm_db commit from mix.lock
        id: locked
        run: |
          locked=$(elixir -e '
          {lock, _binding} = Code.eval_file("mix.lock")

          case lock[:llm_db] do
            {:git, _url, ref, opts} ->
              branch = Keyword.get(opts, :branch)

              if branch == "main" and is_binary(ref) do
                IO.puts(ref)
              else
                raise "Expected llm_db git branch main, got #{inspect(opts)}"
              end

            other ->
              raise "Expected llm_db git dependency in mix.lock, got: #{inspect(other)}"
          end
          ')

          echo "sha=$locked" >> "$GITHUB_OUTPUT"
          echo "short_sha=${locked:0:7}" >> "$GITHUB_OUTPUT"
          echo "Locked llm_db commit: $locked"

      - name: Get latest llm_db main commit
        id: upstream
        run: |
          upstream=$(git ls-remote https://github.com/agentjido/llm_db.git refs/heads/main | cut -f1)
          echo "sha=$upstream" >> "$GITHUB_OUTPUT"
          echo "short_sha=${upstream:0:7}" >> "$GITHUB_OUTPUT"
          echo "Upstream llm_db main commit: $upstream"

      - name: Compare locked vs upstream commits
        id: compare
        run: |
          if [ "${{ steps.locked.outputs.sha }}" = "${{ steps.upstream.outputs.sha }}" ]; then
            echo "already_latest=true" >> "$GITHUB_OUTPUT"
            echo "Already on latest version, nothing to do."
          else
            echo "already_latest=false" >> "$GITHUB_OUTPUT"
            echo "New commit available: ${{ steps.upstream.outputs.short_sha }} (current: ${{ steps.locked.outputs.short_sha }})"
          fi

      - name: Update llm_db dependency
        id: update
        if: steps.compare.outputs.already_latest == 'false'
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix deps.update llm_db

          if git diff --quiet -- mix.lock; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "mix.lock unchanged after update."
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "mix.lock updated."
          fi

      - name: Commit and push update
        if: steps.update.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mix.lock
          git commit -m "mix: update llm_db to ${{ steps.upstream.outputs.short_sha }}"
          git push

      - name: Deploy to Fly PROD
        if: steps.update.outputs.updated == 'true'
        uses: superfly/flyctl-actions@master
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        with:
          args: "deploy -c build/llmdb-prod.toml -a llmdb-prod --remote-only"
