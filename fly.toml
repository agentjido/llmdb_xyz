# fly.toml app configuration file generated for llmdb-prod on 2026-03-11T12:59:35-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'llmdb-prod'
primary_region = 'ord'
kill_signal = 'SIGTERM'
kill_timeout = '5m0s'
swap_size_mb = 512

[deploy]
  strategy = 'rolling'
  wait_timeout = '5m0s'

[env]
  CANONICAL_HOST = 'llmdb.xyz'
  ERL_AFLAGS = '-proto_dist inet6_tcp'
  FLY_APP_NAME = 'llmdb-prod'
  PHX_HOST = 'llmdb.xyz'
  PORT = '8080'
  PRIMARY_REGION = 'ord'

[processes]
  app = '/app/bin/entrypoint'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/status'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '1gb'
